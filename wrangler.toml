name = "wc26-fifa"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Serves the static app (public/) AND runs the /api proxy from one Worker.
[assets]
directory = "./public"
binding = "ASSETS"

# The football-data.org key is NOT here. Set it as an encrypted secret:
#   npx wrangler secret put FOOTBALL_DATA_KEY
# (or Dashboard → your Worker → Settings → Variables & Secrets → Add → Secret)
